server:
  port: 8080
  address: 0.0.0.0

spring:
  datasource:
    url: jdbc:mysql://<你的数据库IP>:3306/blog?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: <数据库用户名>
    password: <数据库密码>
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never
  data:
    redis:
      host: <你的Redis IP>
      port: 6379
      password: <Redis密码>
      database: 0
      timeout: 3000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
    elasticsearch:
      uris: http://<你的ES IP>:9200

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.blog.entity
  configuration:
    map-underscore-to-camel-case: true

blog:
  elasticsearch:
    enabled: true
  jwt:
    secret: <JWT密钥，建议随机字符串>
    expiration: 86400000
  upload:
    path: ${user.dir}/blog-backend/src/main/resources/upload/
